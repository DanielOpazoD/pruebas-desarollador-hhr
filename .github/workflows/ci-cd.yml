name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============================================
  # JOB 1: LINT
  # ============================================
  lint:
    name: Quality Gates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run architecture and security quality checks
        run: npm run check:quality

  # ============================================
  # JOB 2: TEST
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit and integration tests (excluding Firestore rules)
        run: npm run test:ci:unit
        env:
          CI: true

      - name: Run critical sync resilience tests
        run: npm run test:resilience
        env:
          CI: true
      
      - name: Upload test coverage (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
        continue-on-error: true

      - name: Enforce test run contract
        run: |
          echo "Unit/integration test suite completed via test:ci:unit."
          echo "Firestore rules are enforced in dedicated job test:rules:ci."

  # ============================================
  # JOB 3: FIRESTORE RULES
  # ============================================
  firestore-rules:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore rules tests with emulator
        run: npm run test:rules:ci
        env:
          CI: true
          RUN_FIRESTORE_RULES_TESTS: 1

      - name: Run Firestore sync concurrency tests with emulator
        run: npm run test:emulator:sync:ci
        env:
          CI: true
          RUN_FIRESTORE_EMULATOR_TESTS: 1

  # ============================================
  # JOB 4: BUILD
  # ============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test, firestore-rules]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build
        env:
          CI: true

  ci-strict-summary:
    name: CI Strict Summary
    runs-on: ubuntu-latest
    needs: [lint, test, firestore-rules, build]
    steps:
      - name: CI strict gates passed
        run: |
          echo "Quality, unit/integration tests, rules tests, and build all passed."
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # JOB 5: DOCUMENTATION
  # ============================================
  docs:
    name: API Documentation
    runs-on: ubuntu-latest
    needs: [lint, test, firestore-rules]
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate API Documentation
        run: npm run docs:generate
      
      - name: Upload documentation artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/api'

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
