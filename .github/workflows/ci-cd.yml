name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-static:
    name: quality-static
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint (release-blocking)
        run: npm run lint -- --max-warnings 0

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run architecture and security quality checks
        run: npm run check:quality

      - name: Validate explicit hotspot backlog limits
        run: npm run check:hotspot-growth

      - name: Enforce explicit-any policy on critical modules
        run: npm run check:critical-any

      - name: Generate quality metrics snapshot
        run: npm run report:quality-metrics

      - name: Generate operational health snapshot
        run: npm run report:operational-health

      - name: Generate runtime contracts snapshot
        run: npm run report:runtime-contracts

      - name: Generate critical coverage baseline report
        run: npm run report:critical-coverage

      - name: Upload quality metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-metrics
          path: |
            reports/quality-metrics.*
            reports/critical-coverage.*
          retention-days: 30

      - name: Upload operational health artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operational-health
          path: reports/operational-health.*
          retention-days: 30

      - name: Upload runtime contracts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-contracts
          path: reports/runtime-contracts.*
          retention-days: 30

  unit-risk:
    name: unit-risk
    runs-on: ubuntu-latest
    needs: [quality-static]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit and integration tests (excluding Firestore rules)
        run: npm run test:ci:unit
        env:
          CI: true

      - name: Run critical sync resilience tests
        run: npm run test:resilience
        env:
          CI: true

      - name: Run admin health risk tests
        run: npm run test:risk:admin-health
        env:
          CI: true

      - name: Run auth risk tests (popup/redirect/lock)
        run: npm run test:risk:auth
        env:
          CI: true

      - name: Run platform risk tests (auth lock + netlify headers + backup contracts)
        run: npm run test:risk:platform
        env:
          CI: true

      - name: Run sync queue load baseline
        run: npm run test:sync-load
        env:
          CI: true
          SYNC_QUEUE_LOAD_VOLUME: 120
          SYNC_QUEUE_RETRY_VOLUME: 40
          SYNC_QUEUE_LOAD_MAX_MS: 8000
      
      - name: Upload test coverage (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
        continue-on-error: true

      - name: Enforce test run contract
        run: |
          echo "Unit/integration test suite completed via test:ci:unit (without emulator-only suites)."
          echo "Firestore rules + emulator sync/UI suites are enforced in dedicated firestore-rules job."

  rules-emulator:
    name: rules-emulator
    runs-on: ubuntu-latest
    needs: [quality-static]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore rules tests with emulator
        run: npm run test:rules:ci
        env:
          CI: true
          RUN_FIRESTORE_RULES_TESTS: 1

      - name: Run Firestore emulator test suites (sync + UI)
        run: npm run test:emulator:sync:ci
        env:
          CI: true
          RUN_FIRESTORE_EMULATOR_TESTS: 1

  e2e-critical-emulator:
    name: e2e-critical
    runs-on: ubuntu-latest
    needs: [quality-static]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers for critical E2E gate
        run: npx playwright install --with-deps chromium firefox

      - name: Run critical E2E suite with Firestore emulator
        run: npm run test:e2e:critical:ci
        env:
          CI: true
          E2E_CRITICAL_BROWSERS: chromium,firefox
          PLAYWRIGHT_JSON_OUTPUT: reports/e2e/playwright-report.json
          E2E_BUDGET_LOGIN_VISIBLE_MS: 4500
          E2E_BUDGET_AUTH_FEEDBACK_MS: 3000
          E2E_BUDGET_CENSO_VISIBLE_MS: 8000

      - name: Generate E2E operational metrics (flaky + duration)
        if: always()
        run: node scripts/report-e2e-operational-metrics.mjs

      - name: Enforce E2E operational thresholds
        if: always()
        run: node scripts/report-e2e-operational-metrics.mjs --enforce

      - name: Upload E2E critical artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-critical-emulator-artifacts
          path: |
            reports/e2e/**
            playwright-report/**
            test-results/**
          retention-days: 14

  build:
    name: build-budget
    runs-on: ubuntu-latest
    needs: [quality-static, unit-risk, rules-emulator, e2e-critical-emulator]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build
        env:
          CI: true

      - name: Enforce bundle budget
        run: npm run check:bundle-budget

  ci-strict-summary:
    name: ci-summary
    runs-on: ubuntu-latest
    needs: [quality-static, unit-risk, rules-emulator, e2e-critical-emulator, build]
    steps:
      - name: CI strict gates passed
        run: |
          echo "quality-static: passed"
          echo "unit-risk: passed"
          echo "rules-emulator: passed"
          echo "e2e-critical: passed"
          echo "build-budget: passed"
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ============================================
  # JOB 6: DOCUMENTATION
  # ============================================
  docs:
    name: API Documentation
    runs-on: ubuntu-latest
    needs: [quality-static, unit-risk, rules-emulator, e2e-critical-emulator]
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate API Documentation
        run: npm run docs:generate
      
      - name: Upload documentation artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/api'

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
